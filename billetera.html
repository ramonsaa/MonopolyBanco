<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billetera Monopoly</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e272e; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; text-align: center; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 24px; font-weight: bold; box-sizing: border-box; transition: background-color 0.3s; }
        
        .saldo-actual { font-size: 36px; margin-bottom: 20px; color: #2ecc71; font-weight: bold; text-align: center; transition: color 0.3s ease; }
        .inactivo-msg { color: #e74c3c; font-size: 20px; display: none; margin-bottom: 20px; font-weight: bold; text-align: center; }
        input, select, button { width: 100%; max-width: 400px; padding: 15px; margin-bottom: 12px; font-size: 18px; border-radius: 8px; border: none; box-sizing: border-box; text-align: center; }
        input:focus, select:focus { outline: none; border: 2px solid #3498db; }
        input:disabled, select:disabled, button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-pagar { background-color: #c0392b; color: white; font-weight: bold; }
        .btn-transferir { background-color: #34495e; color: white; font-weight: bold; margin-top: 5px; }
        .btn-todos { background-color: #8e44ad; color: white; font-weight: bold;}
        hr { width: 100%; max-width: 400px; border-color: #555; margin: 20px 0; }
        .seccion-titulo { width: 100%; max-width: 400px; font-size: 14px; color: #bdc3c7; text-transform: uppercase; margin-bottom: 10px; text-align: left; font-weight: bold; }
        
        .historial-container { width: 100%; max-width: 400px; background-color: #2c3e50; border-radius: 8px; padding: 15px; box-sizing: border-box; max-height: 220px; overflow-y: auto; text-align: left; font-size: 13px; color: #ecf0f1; border: 1px solid #34495e; }
        .registro { padding: 8px 0; border-bottom: 1px solid #34495e; line-height: 1.4; }
        .registro:last-child { border-bottom: none; }

        /* --- FONDO DORADO PARA EL MAGNATE --- */
        .gold-glow-container { position: fixed; top: 50%; left: 50%; width: 1px; height: 1px; transform: translate(-50%, -50%); box-shadow: 0 0 100vw 50vw rgba(241, 196, 15, 0); z-index: -1; transition: box-shadow 0.3s ease; }
        @keyframes pulseGoldGlow { 
            0% { box-shadow: 0 0 100vw 60vw rgba(241, 196, 15, 0.3); } 
            50% { box-shadow: 0 0 150vw 80vw rgba(241, 196, 15, 0.8), 0 0 50vw 20vw rgba(255, 255, 255, 0.4); } 
            100% { box-shadow: 0 0 100vw 60vw rgba(241, 196, 15, 0.3); } 
        }
        .gold-glow-container.gold-glow-active { animation: pulseGoldGlow 3s infinite ease-in-out; }
        
        .corona-icono { font-size: 28px; display: block; margin-bottom: -5px; animation: flotar 2s infinite ease-in-out;}
        @keyframes flotar { 0% { transform: translateY(0); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="gold-glow-container" id="glowContainer"></div>
    <div class="header" id="headerJugador">Configurando...</div>
    
    <div class="inactivo-msg" id="msgInactivo">🚫 JUGADOR INACTIVO / BANCARROTA 🚫</div>
    <div class="saldo-actual" id="miSaldo">-- M</div>
    
    <div class="seccion-titulo">Monto de la Transacción</div>
    <input type="text" id="montoInput" placeholder="Ej: 1.5, 2 o 500K">
    
    <button class="btn-pagar" id="btnPagar" onclick="procesar('pagar_banco')">Pagar al Banco (-)</button>
    <hr>
    <div class="seccion-titulo">Pagar Renta a Jugador</div>
    <select id="destinoSelect">
        <option value="">Selecciona a quién pagar...</option>
    </select>
    <button class="btn-transferir" id="btnTrans" onclick="procesar('transferir')">Hacer Transferencia</button>
    <button class="btn-todos" id="btnTodos" onclick="procesar('pagar_todos')">Pagar a TODOS</button>
    <hr>
    <div class="seccion-titulo">Últimos Movimientos</div>
    <div class="historial-container" id="historialJugador">
        <div class="registro">Cargando historial...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXwEe_UM2tVwS3qm_SUoIO_jgBPw8mkCM",
            authDomain: "monopolysaava.firebaseapp.com",
            databaseURL: "https://monopolysaava-default-rtdb.firebaseio.com",
            projectId: "monopolysaava",
            storageBucket: "monopolysaava.firebasestorage.app",
            messagingSenderId: "812339314745",
            appId: "1:812339314745:web:a8b330d12b310dd4514de8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        let miId = parseInt(urlParams.get('id'));

        if (!miId || miId < 1 || miId > 6) {
            let respuesta = prompt("¿Qué número de jugador eres? (Del 1 al 6)");
            miId = parseInt(respuesta);
            
            if (!miId || miId < 1 || miId > 6) {
                document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Error: Debes elegir un número del 1 al 6. Recarga la página.</h2>";
                throw new Error("ID de jugador inválido");
            }
        }

        const coloresJugadores = {
            1: '#e74c3c', 2: '#3498db', 3: '#2ecc71', 4: '#f1c40f', 5: '#9b59b6', 6: '#e67e22'
        };
        document.getElementById('headerJugador').style.backgroundColor = coloresJugadores[miId] || '#34495e';
        document.title = `Billetera - Jugador ${miId}`;

        const glowContainer = document.getElementById('glowContainer');
        let saldoAnterior = null; 
        const sonidoDinero = new Audio('caching.mp3'); 

        function formatearMoneda(numero) {
            if (numero >= 1000000) return (numero / 1000000) + ' M';
            if (numero >= 1000) return (numero / 1000) + ' K';
            if (numero === 0) return '0';
            return numero.toLocaleString('es-MX');
        }

        function interpretarEntrada(texto) {
            const txt = String(texto).trim().toUpperCase();
            if (txt === "") return 0;
            if (txt.endsWith('K')) return parseFloat(txt) * 1000;
            if (txt.endsWith('M')) return parseFloat(txt) * 1000000;
            const valor = parseFloat(txt);
            return isNaN(valor) ? 0 : valor * 1000000;
        }

        onValue(ref(db, 'jugadores'), (snapshot) => {
            const jugadores = snapshot.val();
            if (jugadores && jugadores[miId]) {
                const yo = jugadores[miId];
                const isActivo = yo.activo !== false;
                
                document.getElementById('headerJugador').textContent = yo.nombre;

                const elementosUI = ['montoInput', 'destinoSelect', 'btnPagar', 'btnTrans', 'btnTodos'];
                if (!isActivo) {
                    document.getElementById('msgInactivo').style.display = 'block';
                    document.getElementById('miSaldo').style.display = 'none';
                    elementosUI.forEach(id => document.getElementById(id).disabled = true);
                    return; 
                } else {
                    document.getElementById('msgInactivo').style.display = 'none';
                    const saldoElement = document.getElementById('miSaldo');
                    saldoElement.style.display = 'block';
                    
                    if (saldoAnterior !== null && yo.saldo > saldoAnterior) {
                        sonidoDinero.play().catch(e => console.log("Toca la pantalla para audio"));
                    }
                    saldoAnterior = yo.saldo; 
                    
                    // --- CORONA Y COLORES ---
                    if (yo.saldo >= 25000000) {
                        saldoElement.innerHTML = `<span class="corona-icono">👑</span>${formatearMoneda(yo.saldo)}`;
                        saldoElement.style.color = '#f1c40f';
                        glowContainer.classList.add('gold-glow-active'); 
                    } else {
                        saldoElement.innerHTML = formatearMoneda(yo.saldo);
                        glowContainer.classList.remove('gold-glow-active');
                        if (yo.saldo > 10000000) { saldoElement.style.color = '#2ecc71'; } 
                        else if (yo.saldo > 5000000) { saldoElement.style.color = '#f39c12'; } 
                        else { saldoElement.style.color = '#e74c3c'; }
                    }

                    elementosUI.forEach(id => document.getElementById(id).disabled = false);
                }

                const select = document.getElementById('destinoSelect');
                const valorSeleccionado = select.value; 
                select.innerHTML = '<option value="">Selecciona a quién pagar...</option>';
                
                for (let i = 1; i <= 6; i++) {
                    if (i !== miId && jugadores[i] && jugadores[i].activo !== false) {
                        const opt = document.createElement('option');
                        opt.value = i;
                        opt.textContent = jugadores[i].nombre;
                        select.appendChild(opt);
                    }
                }
                select.value = valorSeleccionado; 
            }
        });

        onValue(ref(db, 'historial'), (snapshot) => {
            const historialContainer = document.getElementById('historialJugador');
            historialContainer.innerHTML = '';
            const registros = [];
            snapshot.forEach((child) => { registros.push(child.val()); });
            
            registros.reverse().forEach(reg => {
                const div = document.createElement('div');
                div.className = 'registro';
                div.innerHTML = reg;
                historialContainer.appendChild(div);
            });
        });

        window.procesar = async function(tipo) {
            const montoTexto = document.getElementById('montoInput').value;
            const monto = interpretarEntrada(montoTexto);
            
            if (monto <= 0) return alert("Ingresa un monto válido");

            const botones = document.querySelectorAll('button');
            botones.forEach(b => b.disabled = true);

            try {
                const snapshot = await get(ref(db, 'jugadores'));
                const jugadores = snapshot.val();
                const yo = jugadores[miId];
                
                let idsActivos = [];
                for (let i = 1; i <= 6; i++) {
                    if (i !== miId && jugadores[i] && jugadores[i].activo !== false) {
                        idsActivos.push(i);
                    }
                }

                // Bloqueo estricto
                if (yo.saldo < monto && tipo !== 'pagar_todos') {
                    alert(`❌ ¡Fondos insuficientes!\nTienes ${formatearMoneda(yo.saldo)} y necesitas pagar ${formatearMoneda(monto)}.`);
                    throw new Error("Cancelado");
                }

                let updates = {};
                let logMsg = "";
                const hora = new Date().toLocaleTimeString('es-MX', {hour: '2-digit', minute:'2-digit'});

                if (tipo === 'pagar_banco') {
                    updates[`jugadores/${miId}/saldo`] = yo.saldo - monto;
                    logMsg = `<strong>[${hora}] ${yo.nombre}:</strong><br> Pagó al Banco <strong>- ${formatearMoneda(monto)}</strong>`;
                } 
                else if (tipo === 'transferir') {
                    const idDestino = parseInt(document.getElementById('destinoSelect').value);
                    if (!idDestino) throw new Error("Selecciona a un jugador");
                    
                    const dest = jugadores[idDestino];
                    updates[`jugadores/${miId}/saldo`] = yo.saldo - monto;
                    updates[`jugadores/${idDestino}/saldo`] = dest.saldo + monto;
                    logMsg = `<strong>[${hora}] ${yo.nombre}:</strong><br> Pagó a ${dest.nombre} <strong>${formatearMoneda(monto)}</strong>`;
                }
                else if (tipo === 'pagar_todos') {
                    if (idsActivos.length === 0) throw new Error("No hay otros jugadores activos en la partida para pagarles.");
                    
                    const total = monto * idsActivos.length;
                    
                    if (yo.saldo < total) {
                        alert(`❌ ¡Bancarrota inminente!\nPagar a todos cuesta ${formatearMoneda(total)} y solo tienes ${formatearMoneda(yo.saldo)}.`);
                        throw new Error("Cancelado");
                    } else {
                        if (!confirm(`Pagarás ${formatearMoneda(monto)} a los ${idsActivos.length} jugadores activos (Total: ${formatearMoneda(total)}). ¿Confirmas?`)) throw new Error("Cancelado");
                    }
                    
                    updates[`jugadores/${miId}/saldo`] = yo.saldo - total;
                    idsActivos.forEach(id => {
                        updates[`jugadores/${id}/saldo`] = jugadores[id].saldo + monto;
                    });
                    logMsg = `<strong>[${hora}] ${yo.nombre}:</strong><br> Pagó a TODOS <strong>${formatearMoneda(monto)} c/u</strong>`;
                }

                await update(ref(db), updates);
                await push(ref(db, 'historial'), logMsg);
                
                document.getElementById('montoInput').value = '';
                if(navigator.vibrate) navigator.vibrate(50);

            } catch (error) {
                if (error.message !== "Cancelado") alert(error.message);
            } finally {
                botones.forEach(b => b.disabled = false);
            }
        }
    </script>
</body>
</html>
