<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bancopoly - Lobby</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e272e; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* LOGO Y ENCABEZADO */
        .logo-container { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .logo-icono { font-size: 50px; margin-bottom: -10px; display: block; }
        .logo-texto { font-size: 32px; font-weight: bold; margin: 0; letter-spacing: 2px; }
        .logo-sub { color: #bdc3c7; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* TARJETAS DE SECCIÓN */
        .card { background-color: #2c3e50; width: 100%; max-width: 400px; border-radius: 12px; padding: 20px; box-sizing: border-box; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .card-titulo { font-size: 18px; color: #ecf0f1; border-bottom: 2px solid #34495e; padding-bottom: 10px; margin-top: 0; margin-bottom: 15px; text-align: center; font-weight: bold; }

        /* INPUTS Y BOTONES */
        input, select, button { width: 100%; padding: 14px; margin-bottom: 15px; font-size: 16px; border-radius: 8px; border: none; box-sizing: border-box; text-align: center; }
        input:focus, select:focus { outline: none; border: 2px solid #3498db; background-color: #f8f9fa; }
        input { background-color: #ecf0f1; color: #2c3e50; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        select { background-color: #ecf0f1; color: #2c3e50; font-weight: bold; cursor: pointer; }
        
        .btn-unirse { background-color: #2ecc71; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #27ae60; }
        .btn-unirse:active { transform: translateY(4px); box-shadow: none; }
        
        .btn-crear { background-color: #3498db; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #2980b9; }
        .btn-crear:active { transform: translateY(4px); box-shadow: none; }

        /* SECCIÓN PREMIUM */
        .premium-banner { background: linear-gradient(135deg, #f39c12, #d35400); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .premium-texto { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .btn-premium { background-color: #1e272e; color: #f1c40f; font-weight: bold; font-size: 14px; padding: 10px; margin: 0; border: 1px solid #f1c40f; cursor: pointer; }

        .opcion-bloqueada { color: #7f8c8d; font-style: italic; }
        .badge-gratis { background-color: #95a5a6; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; vertical-align: middle; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="logo-container">
        <span class="logo-icono">🎩</span>
        <h1 class="logo-texto">BANCOPOLY</h1>
        <div class="logo-sub">Billetera Digital</div>
    </div>

    <div class="card">
        <h2 class="card-titulo">Entrar a una Partida</h2>
        <input type="text" id="pinSala" placeholder="PIN DE LA SALA (Ej. A7B9Q)" maxlength="5">
        <select id="numeroJugador">
            <option value="">¿Qué jugador eres?</option>
            <option value="1">Jugador 1 (Rojo)</option>
            <option value="2">Jugador 2 (Azul)</option>
            <option value="3">Jugador 3 (Verde)</option>
            <option value="4">Jugador 4 (Amarillo)</option>
            <option value="5">Jugador 5 (Morado)</option>
            <option value="6">Jugador 6 (Naranja)</option>
        </select>
        <button class="btn-unirse" onclick="unirsePartida()">Entrar a Jugar</button>
    </div>

    <div class="card">
        <h2 class="card-titulo">Crear Nueva Partida</h2>
        
        <select id="tipoJuego">
            <option value="millonario">Monopoly Millonario (15M)</option>
            <option value="clasico">Monopoly Clásico ($1,500)</option>
            <option value="turista" class="opcion-bloqueada" disabled>Turista Mundial ($150,000) 🔒 PRO</option>
            <option value="custom" class="opcion-bloqueada" disabled>Cantidades Personalizadas 🔒 PRO</option>
        </select>

        <select id="capacidadJugadores">
            <option value="4">Hasta 4 Jugadores (Versión Gratis)</option>
            <option value="6" class="opcion-bloqueada" disabled>Hasta 6 Jugadores 🔒 PRO</option>
        </select>

        <div class="premium-banner">
            <div class="premium-texto">👑 Desbloquea el modo VIP para 6 jugadores, efectos dorados y más plantillas.</div>
            <button class="btn-premium">Desbloquear PRO por $49 MXN</button>
        </div>

        <button class="btn-crear" onclick="crearPartida()">Crear y ser Banquero</button>
    </div>

    <script>
        // --- REVISIÓN DE MEMORIA (El truco del localStorage) ---
        // Apenas carga la página, revisamos si el usuario se había salido por accidente
        window.onload = function() {
            const salaGuardada = localStorage.getItem('miSalaActiva');
            const idGuardado = localStorage.getItem('miIdJugador');
            
            if (salaGuardada && idGuardado) {
                // Si encontramos el post-it, le avisamos y lo reconectamos
                const reconectar = confirm(`¡Detectamos que estabas en la sala ${salaGuardada}!\n¿Quieres regresar a la partida?`);
                if (reconectar) {
                    window.location.href = `billetera.html?sala=${salaGuardada}&id=${idGuardado}`;
                } else {
                    // Si dice que no, rompemos el post-it
                    localStorage.removeItem('miSalaActiva');
                    localStorage.removeItem('miIdJugador');
                }
            }
        };

        // --- FUNCIONES DE LOS BOTONES ---
        function unirsePartida() {
            const pin = document.getElementById('pinSala').value.toUpperCase();
            const jugador = document.getElementById('numeroJugador').value;

            if (pin.length < 5) return alert("Ingresa un PIN válido de 5 caracteres.");
            if (!jugador) return alert("Selecciona qué número de jugador eres.");

            // Pegamos el "post-it" en su celular para que no pierda la sesión
            localStorage.setItem('miSalaActiva', pin);
            localStorage.setItem('miIdJugador', jugador);

            // Lo mandamos a la app de la billetera pasándole los datos por la URL
            window.location.href = `billetera.html?sala=${pin}&id=${jugador}`;
        }

        function crearPartida() {
            const tipo = document.getElementById('tipoJuego').value;
            // Aquí luego meteremos la lógica para generar el PIN aleatorio en Firebase
            // Por ahora, generamos uno de mentira para probar la vista
            const pinesAleatorios = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let nuevoPin = "";
            for (let i = 0; i < 5; i++) {
                nuevoPin += pinesAleatorios.charAt(Math.floor(Math.random() * pinesAleatorios.length));
            }

            alert(`¡Se crearía la base de datos para la sala ${nuevoPin} con reglas de ${tipo}!\n\nPróximo paso: Llevar al Banquero a la pantalla de control.`);
        }
    </script>
</body>
</html>
